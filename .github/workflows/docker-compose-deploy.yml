name: Docker Compose Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load .env file
        working-directory: deploy/${{ inputs.environment }}
        run: |
          grep -v -e '^#' -e '^$' .env >> $GITHUB_ENV

      - name: Validate Environment Variables
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
        run: |
          [ -n "$SSH_KEY" ] || { echo "secret.SSH_KEY is empty"; exit 1; }
          [ -n "$SSH_HOST" ] || { echo "SSH_HOST is empty"; exit 1; }
          [ -n "$SSH_USER" ] || { echo "SSH_USER is empty"; exit 1; }
          [ -n "$DOCKER_REGISTRY_ADDR" ] || { echo "DOCKER_REGISTRY_ADDR is empty"; exit 1; }
          [ -n "$DOCKER_REGISTRY_USER" ] || { echo "DOCKER_REGISTRY_USER is empty"; exit 1; }
          [ -n "$DOCKER_REGISTRY_PASSWORD" ] || { echo "secret.DOCKER_REGISTRY_PASSWORD is empty"; exit 1; }

      - name: Set up SSH Key and Agent
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Create Docker Context
        run: |
          docker context create remote-server --docker "host=ssh://$SSH_USER@$SSH_HOST"
          docker context use remote-server

      - name: Configure Insecure Registry
        run: |
          sudo mkdir -p /etc/docker
          echo "{ \"insecure-registries\":[\"$DOCKER_REGISTRY_ADDR\"] }" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Log in to Private Docker Registry
        env:
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
        run: |
          echo "$DOCKER_REGISTRY_PASSWORD" | docker login "$DOCKER_REGISTRY_ADDR" -u "$DOCKER_REGISTRY_USER" --password-stdin

      - name: Deploy via Docker Compose
        working-directory: deploy/${{ inputs.environment }}
        run: |
          RAW_NAME="${{ github.event.repository.name }}"
          CLEAN_NAME="${RAW_NAME%%-sources*}"
          PROJECT_NAME="${CLEAN_NAME//-/_}_${{ inputs.environment }}"

          docker compose -p "$PROJECT_NAME" pull
          docker compose -p "$PROJECT_NAME" up -d --remove-orphans
